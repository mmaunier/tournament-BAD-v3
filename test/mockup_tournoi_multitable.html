<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salles de Tournoi - Vue Multi-Poules (Mockup)</title>
    <style>
        :root {
            --poule-1-color: #3498db; /* Blue */
            --poule-1-bg: #eaf6ff;
            --poule-2-color: #e74c3c; /* Red */
            --poule-2-bg: #ffeaea;
            --poule-3-color: #2ecc71; /* Green */
            --poule-3-bg: #ebffef;
            --poule-4-color: #f1c40f; /* Yellow */
            --poule-4-bg: #ffffea;
            --neutral-color: #95a5a6;
            --neutral-bg: #f0f0f0;
            --dark-text: #2c3e50;
            --light-text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: var(--dark-text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR - CONTROLS */
        .sidebar {
            width: 300px;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            overflow-y: auto;
            flex-shrink: 0;
        }

        .app-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 1px solid #34495e;
            padding-bottom: 10px;
        }

        .poule-control {
            background-color: #34495e;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid transparent;
        }

        .poule-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .poule-name {
            font-weight: bold;
            font-size: 1.1em;
        }

        .poule-info {
            font-size: 0.9em;
            color: #bdc3c7;
            margin-bottom: 10px;
        }

        .progress-bar-container {
            height: 8px;
            background-color: #2c3e50;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .btn-next-round {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 4px;
            background-color: #27ae60;
            color: white;
            cursor: pointer;
            font-weight: bold;
            opacity: 0.5; 
            pointer-events: none; /* Disabled by default */
        }
        
        .btn-next-round.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .btn-next-round:hover {
            background-color: #2ecc71;
        }

        /* MAIN CONTENT - DASHBOARD */
        .main-content {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .scenario-selector {
            padding: 10px;
            background: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .courts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding-bottom: 20px;
        }

        /* COURT CARD */
        .court-card {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 220px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .court-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
        
        .court-card.empty {
            opacity: 0.6;
            background-color: #f9f9f9;
            border: 2px dashed #ccc;
            box-shadow: none;
        }

        .court-header {
            padding: 10px 15px;
            font-weight: bold;
            font-size: 1.2em;
            display: flex;
            justify-content: space-between;
            background-color: var(--neutral-bg);
            color: var(--dark-text);
            border-bottom: 1px solid #eee;
        }

        .court-badge {
            font-size: 0.7em;
            padding: 3px 8px;
            border-radius: 12px;
            background-color: #fff;
            color: #333;
            font-weight: normal;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .court-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10px;
            position: relative;
        }

        /* Match Display */
        .match-display {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            height: 100%;
        }
        
        .team {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0,0,0,0.03);
            border-radius: 6px;
            padding: 8px;
            flex: 1;
            height: 80%;
            text-align: center;
        }
        
        .team-players {
            font-weight: 500;
            font-size: 1.0em;
            line-height: 1.3;
        }
        
        .vs-separator {
            padding: 0 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .vs-text {
            font-size: 0.7em;
            color: #999;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .match-score {
            font-size: 1.8em;
            font-weight: bold;
            color: #2c3e50;
            white-space: nowrap;
        }
        
        .match-status {
            text-align: center;
            margin-top: 10px;
            font-size: 0.9em;
            color: #7f8c8d;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            color: #aaa;
            font-style: italic;
        }

        /* Modal Score */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }
        
        .modal-title {
            margin-top: 0;
            color: #2c3e50;
        }
        
        .score-inputs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            align-items: center;
        }
        
        .score-input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .score-input {
            width: 60px;
            height: 60px;
            font-size: 2em;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
        
        .btn-validate {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
        }

        .btn-close {
            background-color: #95a5a6;
            margin-left: 10px;
        }

        /* COLOR UTILS */
        .color-poule-1 { background-color: var(--poule-1-color); }
        .bg-poule-1 { background-color: var(--poule-1-bg); border-left: 5px solid var(--poule-1-color); }
        .text-poule-1 { color: var(--poule-1-color); }
        
        .color-poule-2 { background-color: var(--poule-2-color); }
        .bg-poule-2 { background-color: var(--poule-2-bg); border-left: 5px solid var(--poule-2-color); }
        .text-poule-2 { color: var(--poule-2-color); }

        .color-poule-3 { background-color: var(--poule-3-color); }
        .bg-poule-3 { background-color: var(--poule-3-bg); border-left: 5px solid var(--poule-3-color); }
        .text-poule-3 { color: var(--poule-3-color); }

        .color-poule-4 { background-color: var(--poule-4-color); }
        .bg-poule-4 { background-color: var(--poule-4-bg); border-left: 5px solid var(--poule-4-color); }
        .text-poule-4 { color: var(--poule-4-color); }
        
        /* NOVELTY: Round Nav and Info */
        .round-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.15);
            border-radius: 4px;
            padding: 5px;
            margin-bottom: 10px;
        }
        
        .btn-nav {
            background: rgba(255,255,255,0.1);
            border: none;
            color: inherit;
            font-size: 1.2em;
            cursor: pointer;
            padding: 2px 10px;
            border-radius: 4px;
        }
        
        .btn-nav:hover { background: rgba(255,255,255,0.3); }
        .btn-nav:disabled { opacity: 0.2; cursor: not-allowed; }
        
        .round-status {
            font-size: 0.85em;
            text-align: center;
            padding: 5px 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-weight: bold;
        }
        
        .status-live { background-color: #27ae60; color: white; }
        .status-editing { background-color: #f39c12; color: white; }
        .status-done { background-color: #7f8c8d; color: white; }

        .btn-set-live {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 4px;
            background-color: #3498db;
            color: white;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .btn-set-live:hover { background-color: #2980b9; }

        /* NOVELTY: Byes section */
        .byes-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #bdc3c7;
        }

        .byes-section h3 {
            margin-top: 0;
            color: var(--dark-text);
            font-size: 1.2em;
        }

        .byes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .poule-byes-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .poule-byes-header {
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .byes-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .bye-player {
            background: rgba(0,0,0,0.05);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.9em;
            color: #333;
            border: 1px solid rgba(0,0,0,0.1);
        }

    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="app-title">Gestion Tournoi</div>
        <div id="poule-controls">
            <!-- Injecté par JS -->
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <div class="dashboard-header">
            <h2>Vue d'ensemble des Terrains</h2>
            <div class="scenario-selector">
                <label>Scénario : </label>
                <select id="scenarioSelect" onchange="app.loadScenario(this.value)">
                    <option value="A">Scénario A (2 Poules, 7 terrains)</option>
                    <option value="B">Scénario B (4 Poules, 7 terrains)</option>
                </select>
                <button onclick="app.resetData()">Re-générer</button>
            </div>
        </div>

        <div class="courts-grid" id="courtsGrid">
            <!-- Injecté par JS -->
        </div>

        <!-- NEW: BYES SECTION -->
        <div class="byes-section">
            <h3>Joueurs au repos (Sortants / Byes)</h3>
            <div class="byes-grid" id="byesGrid">
                <!-- Injecté par JS -->
            </div>
        </div>
    </div>

    <!-- MODAL SCORE -->
    <div class="modal-overlay" id="scoreModal">
        <div class="modal-content">
            <h3 class="modal-title">Saisir le score</h3>
            <p id="modalMatchInfo"></p>
            <div class="score-inputs">
                <div class="score-input-group">
                    <label id="labelTeam1">Eq 1</label>
                    <input type="number" id="score1" class="score-input" min="0" value="0">
                </div>
                <div>-</div>
                <div class="score-input-group">
                    <label id="labelTeam2">Eq 2</label>
                    <input type="number" id="score2" class="score-input" min="0" value="0">
                </div>
            </div>
            <button class="btn-validate" onclick="app.saveScore()">Valider</button>
            <button class="btn-validate btn-close" onclick="app.closeModal()">Annuler</button>
        </div>
    </div>

    <!-- LOGIC SCRIPT -->
    <script>
        
        // --- 1. GENERATEUR (Simplifié pour le test mais logique OK) ---
        class GenerateurDynamique {
           constructor(nbJoueurs, nbTerrains, nbTours = null) {
              this.nbJoueurs = nbJoueurs;
              this.nbTerrains = nbTerrains;
              // Calculs limites
              this.joueursParTour = Math.min(4 * nbTerrains, Math.floor(nbJoueurs / 4) * 4);
              this.nbTours = nbTours || (nbJoueurs - 1);
              this.tours = [];
              this.byes = []; // NOUVEAU: stocker les byes
           }

           generer() {
               // Pour le mockup, on génère des faux tours avec des faux joueurs
               // On simule une structure [ [Match1, Match2, ...], [Match1, ... ] ]
               for(let t=0; t < this.nbTours; t++) {
                   let matchsDuTour = [];
                   let byesDuTour = [];
                   // Combien de matchs max ?
                   let nbMatchs = Math.floor(this.joueursParTour / 4);
                   
                   // Génération d'indices aléatoires pour ce tour (juste pour avoir des nombres différents)
                   let indices = Array.from({length: this.nbJoueurs}, (_, i) => i);
                   this.shuffleArray(indices);

                   for(let m=0; m < nbMatchs; m++) {
                       let p1 = indices.pop();
                       let p2 = indices.pop();
                       let p3 = indices.pop();
                       let p4 = indices.pop();
                       matchsDuTour.push({
                           id: `T${t}-M${m}`,
                           equipe1: [p1, p2],
                           equipe2: [p3, p4],
                           score1: null,
                           score2: null,
                           terrain: null // Sera assigné par le contrôleur
                       });
                   }
                   
                   // Les joueurs restants sont en byes
                   while(indices.length > 0) {
                       byesDuTour.push(indices.pop());
                   }
                   
                   this.tours.push(matchsDuTour);
                   this.byes.push(byesDuTour);
               }
           }

           shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
            }
        }

        // --- 2. DONNEES & CLASSES METIER MOCKUP ---

        const NAMES = [
            "Lucas", "Thomas", "Camille", "Léa", "Manon", "Chloé", "Maxime", "Alexandre", "Antoine", "Nicolas",
            "Julie", "Sarah", "Marie", "Laura", "Pauline", "Mathieu", "Julien", "Romain", "Pierre", "Florian",
            "Mélanie", "Elodie", "Céline", "Audrey", "Kevin", "Clément", "Benjamin", "Adrien", "Guillaume", "Jérémy",
            "Anaïs", "Sophie", "Marine", "Amandine", "Emilie", "Anthony", "David", "Vincent", "Jonathan", "Mickael",
            "Emma", "Jade", "Louise", "Alice", "Lina", "Gabriel", "Léo", "Raphaël", "Arthur", "Louis"
        ];

        class Poule {
            constructor(id, nom, colorIndex, nbJoueurs, terrainStart, terrainEnd) {
                this.id = id;
                this.nom = nom;
                this.colorIndex = colorIndex; // 1, 2, 3, 4
                this.nbJoueurs = nbJoueurs;
                this.terrainStart = terrainStart; // ex: 1
                this.terrainEnd = terrainEnd;     // ex: 3
                
                this.joueurs = this.generatePlayers(nbJoueurs);
                this.nbTerrains = (terrainEnd - terrainStart) + 1;
                
                this.generateur = new GenerateurDynamique(nbJoueurs, this.nbTerrains, 6); // 6 tours pour tester
                this.generateur.generer();
                
                this.tours = this.generateur.tours;
                this.byes = this.generateur.byes;
                
                this.viewedRoundIndex = 0; // Tour visualisé (pour modif scores)
                this.liveRoundIndex = 0;   // Tour actif projeté
                
                this.matchesOnCourts = {}; // { terrainId: matchObject }
                
                // Assigner le premier tour aux terrains pour la vue
                this.assignRoundToCourts(0);
            }

            generatePlayers(n) {
                let players = [];
                // Mélanger les noms pour avoir des noms différents à chaque fois
                let mixedNames = [...NAMES].sort(() => 0.5 - Math.random());
                for(let i=0; i<n; i++) {
                    players.push({ id: i, nom: mixedNames[i % mixedNames.length] + " " + (Math.floor(i/NAMES.length)+1) });
                }
                return players;
            }

            // Assigne les matchs du tour T aux terrains disponibles pour cette poule
            assignRoundToCourts(roundIndex) {
               if (roundIndex >= this.tours.length) return; // Fini

               const matches = this.tours[roundIndex];
               let courtIdx = this.terrainStart;
               
               // Reset courts for this poule
               this.matchesOnCourts = {};

               matches.forEach(match => {
                   if (courtIdx <= this.terrainEnd) {
                       match.terrain = courtIdx;
                       this.matchesOnCourts[courtIdx] = match;
                       courtIdx++;
                   }
               });
            }

            isRoundFinished(roundIdx) {
                if (roundIdx >= this.tours.length) return true;
                const matches = this.tours[roundIdx];
                return matches.every(m => m.score1 !== null && m.score2 !== null);
            }

            getProgress(roundIdx) {
                if (roundIdx >= this.tours.length) return 100;
                const matches = this.tours[roundIdx];
                if (matches.length === 0) return 100;
                const done = matches.filter(m => m.score1 !== null).length;
                return (done / matches.length) * 100;
            }

            changeViewedRound(delta) {
                let newVal = this.viewedRoundIndex + delta;
                if (newVal >= 0 && newVal < this.tours.length) {
                    this.viewedRoundIndex = newVal;
                    this.assignRoundToCourts(this.viewedRoundIndex);
                    return true;
                }
                return false;
            }
            
            setLiveRound() {
                this.liveRoundIndex = this.viewedRoundIndex;
            }
        }

        class App {
            constructor() {
                this.poules = [];
                this.terrainsCount = 7; // Fixe pour ce test
                this.currentScenario = 'A';
                this.editingMatch = null;
                this.editingPoule = null;
            }

            init() {
                this.loadScenario('A');
            }

            loadScenario(scenarioCode) {
                this.currentScenario = scenarioCode;
                this.poules = [];
                
                if (scenarioCode === 'A') {
                    // Scenario A: 2 poules (24j/3t, 32j/4t)
                    this.poules.push(new Poule('p1', 'Poule A (24j)', 1, 24, 1, 3));
                    this.poules.push(new Poule('p2', 'Poule B (32j)', 2, 32, 4, 7));
                } else {
                    // Scenario B: 4 poules
                    this.poules.push(new Poule('p1', 'Poule A (6j)', 1, 6, 1, 1));
                    this.poules.push(new Poule('p2', 'Poule B (12j)', 2, 12, 2, 3));
                    this.poules.push(new Poule('p3', 'Poule C (10j)', 3, 10, 4, 5));
                    this.poules.push(new Poule('p4', 'Poule D (11j)', 4, 11, 6, 7));
                }

                this.renderAll();
            }

            resetData() {
                this.loadScenario(this.currentScenario);
            }

            // --- RENDER ---

            renderAll() {
                this.renderSidebar();
                this.renderGrid();
                this.renderByes();
            }

            renderSidebar() {
                const container = document.getElementById('poule-controls');
                container.innerHTML = '';

                this.poules.forEach(poule => {
                    const div = document.createElement('div');
                    div.className = `poule-control bg-poule-${poule.colorIndex}`;
                    
                    const vRound = poule.viewedRoundIndex;
                    const progress = poule.getProgress(vRound);
                    const isFinished = poule.isRoundFinished(vRound);
                    const isLive = (vRound === poule.liveRoundIndex);
                    
                    let statusHtml = '';
                    if (isLive) {
                         statusHtml = `<div class="round-status status-live">Live - Projecteur</div>`;
                    } else if (isFinished) {
                         statusHtml = `<div class="round-status status-done">Terminé (Scores remplis)</div>`;
                    } else {
                         statusHtml = `<div class="round-status status-editing">En cours de modification</div>`;
                    }

                    div.innerHTML = `
                        <div class="poule-header">
                            <span class="poule-name text-poule-${poule.colorIndex}">${poule.nom}</span>
                            <span class="court-badge">Terrains ${poule.terrainStart}-${poule.terrainEnd}</span>
                        </div>
                        
                        <div class="round-nav">
                            <button class="btn-nav" onclick="app.changeRound('${poule.id}', -1)" ${vRound === 0 ? 'disabled' : ''}>&#9664;</button>
                            <span style="font-weight:bold;">Tour affiché : ${vRound + 1} / ${poule.tours.length}</span>
                            <button class="btn-nav" onclick="app.changeRound('${poule.id}', 1)" ${vRound === poule.tours.length - 1 ? 'disabled' : ''}>&#9654;</button>
                        </div>
                        
                        ${statusHtml}
                        
                        <div class="progress-bar-container">
                            <div class="progress-bar color-poule-${poule.colorIndex}" style="width: ${progress}%"></div>
                        </div>
                        
                        <button class="btn-set-live" onclick="app.setLive('${poule.id}')" ${isLive ? 'style="display:none;"' : ''}>
                            Définir comme ACTIF
                        </button>
                    `;
                    container.appendChild(div);
                });
            }

            renderGrid() {
                const grid = document.getElementById('courtsGrid');
                grid.innerHTML = '';

                // On boucle sur tous les terrains physiques de 1 à 7
                for (let t = 1; t <= this.terrainsCount; t++) {
                    const card = document.createElement('div');
                    
                    // Trouver quelle poule occupe ce terrain
                    const occupancy = this.getPouleAndMatchForCourt(t);
                    
                    if (occupancy) {
                        const { poule, match } = occupancy;
                        
                        card.className = `court-card bg-poule-${poule.colorIndex}`;
                        // Si le match est terminé, on le fonce un peu ou on l'indique
                        if (match && match.score1 !== null) {
                            card.style.opacity = '0.7'; 
                        }

                        // Récupérer les noms
                        const n1 = poule.joueurs[match.equipe1[0]].nom;
                        const n2 = poule.joueurs[match.equipe1[1]].nom;
                        const n3 = poule.joueurs[match.equipe2[0]].nom;
                        const n4 = poule.joueurs[match.equipe2[1]].nom;

                        const scoreDisplay = (match.score1 !== null) 
                                            ? `<span class="text-poule-${poule.colorIndex}">${match.score1} - ${match.score2}</span>` 
                                            : '--';

                        // Click event pour saisir score
                        card.onclick = () => this.openScoreModal(poule.id, match, n1, n2, n3, n4);

                        card.innerHTML = `
                            <div class="court-header">
                                <span>Terrain ${t}</span>
                                <span class="court-badge">Tour ${poule.viewedRoundIndex + 1}</span>
                            </div>
                            <div class="court-content">
                                <div class="match-display">
                                    <div class="team">
                                        <div class="team-players">${n1}<br>${n2}</div>
                                    </div>
                                    <div class="vs-separator">
                                        <div class="vs-text">VS</div>
                                        <div class="match-score">${scoreDisplay}</div>
                                    </div>
                                    <div class="team">
                                        <div class="team-players">${n3}<br>${n4}</div>
                                    </div>
                                </div>
                                <div class="match-status">
                                    ${match.score1 !== null ? "Terminé" : "En cours..."}
                                </div>
                            </div>
                        `;
                    } else {
                        // Terrain vide (aucun match assigné pour ce tour sur ce terrain, ce qui est rare si l'algo est bon, mais possible en fin de tournoi)
                        card.className = "court-card empty";
                        card.innerHTML = `
                            <div class="court-header">Terrain ${t}</div>
                            <div class="court-content empty-state">
                                Disponible
                            </div>
                        `;
                    }
                    grid.appendChild(card);
                }
            }

            renderByes() {
                const grid = document.getElementById('byesGrid');
                grid.innerHTML = '';

                this.poules.forEach(poule => {
                    const byesIndices = poule.byes[poule.viewedRoundIndex] || [];
                    if (byesIndices.length > 0) {
                        const byesNames = byesIndices.map(idx => `<div class="bye-player">${poule.joueurs[idx].nom}</div>`).join('');
                        
                        const card = document.createElement('div');
                        card.className = `poule-byes-card border-poule-${poule.colorIndex}`;
                        card.style.borderTop = `4px solid var(--poule-${poule.colorIndex}-color)`;
                        card.innerHTML = `
                            <div class="poule-byes-header text-poule-${poule.colorIndex}">
                                <span>${poule.nom} - Sortants</span>
                                <span class="court-badge">Tour ${poule.viewedRoundIndex + 1}</span>
                            </div>
                            <div class="byes-list">
                                ${byesNames}
                            </div>
                        `;
                        grid.appendChild(card);
                    }
                });
            }

            getPouleAndMatchForCourt(terrainId) {
                // Cherche quelle poule active utilise ce terrain
                for (let p of this.poules) {
                    if (terrainId >= p.terrainStart && terrainId <= p.terrainEnd) {
                        const match = p.matchesOnCourts[terrainId];
                        if (match) return { poule: p, match: match };
                    }
                }
                return null;
            }

            // --- ACTIONS ---

            changeRound(pouleId, delta) {
                const poule = this.poules.find(p => p.id === pouleId);
                if (poule && poule.changeViewedRound(delta)) {
                    this.renderAll();
                }
            }
            
            setLive(pouleId) {
                const poule = this.poules.find(p => p.id === pouleId);
                if (poule) {
                    poule.setLiveRound();
                    this.renderAll();
                }
            }

            openScoreModal(pouleId, match, n1, n2, n3, n4) {
                this.editingPoule = this.poules.find(p => p.id === pouleId);
                this.editingMatch = match;
                
                document.getElementById('modalMatchInfo').innerHTML = `<strong>${n1} & ${n2}</strong> vs <strong>${n3} & ${n4}</strong>`;
                document.getElementById('score1').value = match.score1 !== null ? match.score1 : 0;
                document.getElementById('score2').value = match.score2 !== null ? match.score2 : 0;
                document.getElementById('scoreModal').classList.add('active');
            }

            closeModal() {
                 document.getElementById('scoreModal').classList.remove('active');
                 this.editingMatch = null;
                 this.editingPoule = null;
            }

            saveScore() {
                if (this.editingMatch) {
                    const s1 = parseInt(document.getElementById('score1').value);
                    const s2 = parseInt(document.getElementById('score2').value);
                    this.editingMatch.score1 = s1;
                    this.editingMatch.score2 = s2;
                    this.closeModal();
                    this.renderAll(); // Met à jour la grille et la barre de progression
                }
            }
        }

        // START
        const app = new App();
        app.init();

    </script>
</body>
</html>
